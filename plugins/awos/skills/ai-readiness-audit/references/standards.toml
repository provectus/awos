# --- bands (DORA-style thresholds) ---

# ---------------------------------------------------------------------------
# [band.*] — thresholds for banded metrics
# ---------------------------------------------------------------------------

# cyclomatic_complexity: Cyclomatic complexity bands (McCabe 1976 thresholds)

[band.cyclomatic_complexity]
metric = "cyclomatic_complexity"
source = "McCabe 1976"
elite = "avg_ccn <= 5"
high = "avg_ccn <= 10"
medium = "avg_ccn <= 15"
low = "avg_ccn > 15"

[band.complexity_hotspots]
metric = "cyclomatic_complexity"
source = "McCabe 1976"
elite = "hotspots = 0"
high = "hotspots <= 5"
medium = "hotspots <= 20"
low = "hotspots > 20"

# ---------------------------------------------------------------------------
# [band.*] — thresholds for banded metrics
# ---------------------------------------------------------------------------

# merge_frequency / lead_time_for_change: DORA delivery bands

[band.deploy_frequency]
metric = "merge_frequency"
source = "DORA State of DevOps"
elite = "multiple per day"
high = "once per day to once per week"
medium = "once per week to once per month"
low = "< once per month"

[band.lead_time_for_change]
metric = "lead_time_for_change"
source = "DORA State of DevOps"
elite = "< 1 day"
high = "< 1 week"
medium = "< 1 month"
low = ">= 1 month"

[band.change_failure_rate]
metric = "change_failure_rate"
source = "DORA State of DevOps"
elite = "0–5%"
high = "5–10%"
medium = "10–15%"
low = "> 15%"

[band.mttr]
metric = "mttr"
source = "DORA State of DevOps"
elite = "< 1 hour"
high = "< 1 day"
medium = "< 1 week"
low = ">= 1 week"

[band.ci_pass_rate]
metric = "ci_pass_rate"
source = "Martin Fowler CI/CD"
elite = ">= 99%"
high = ">= 95%"
medium = ">= 90%"
low = "< 90%"

[band.work_mix]
metric = "work_mix_allocation"
source = "DX Core 4"
elite = "Growth >= 60%"
high = "Growth >= 45%"
medium = "Growth >= 30%"
low = "Growth < 30%"
