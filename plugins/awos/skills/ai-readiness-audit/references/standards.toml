definition = "Onboarding enabler presence as a proxy for the DX Core 4 'Time to 10th PR' outcome (average time for a new engineer to merge their 10th pull request). Four boolean signals are checked: (1) README contains a setup/install/getting-started/usage/quickstart heading or a common bootstrap command (npm install, yarn, pnpm install, make, docker compose, pip install, poetry install, ./gradlew, bundle install, go build/run, cargo build, uv sync); (2) agent context file present (CLAUDE.md/AGENTS.md or topology.has_agent_instruction_files); (3) .env example file present (.env.example/.env.sample/.env.template/.env.dist); (4) one-command bootstrap present (Makefile, justfile, Taskfile, docker-compose.yml, setup.sh, or package.json with setup/bootstrap/dev script). value = present_count/4 (0..1). Ramp-time (median first-commit to first-merge) is intentionally not measured — it overlaps lead-time/review-rework metrics and is not always available. Band thresholds are AWOS heuristics (no published DX Core 4 numeric targets): good ≥0.75, watch ≥0.50, concerning <0.50."
applies_when = "always"
sources = ["git"]
reliability_default = "minimal"
source = "DX Core 4 (GetDX) — Time to 10th PR"
url = "https://getdx.com/blog/software-development-metrics/"
