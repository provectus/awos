method = "judgment"
rubric = "List the top-level module directories (first 2 nesting levels). For each, assess: does the name clearly indicate its purpose, and do the files inside relate to that purpose? Flag 'god modules' (30+ files, or mixing unrelated concerns). PASS if modules have clear names and focused contents with no god modules. WARN if 1-2 broad modules exist but most are well-scoped. FAIL if multiple god modules or catch-all directories (utils/, helpers/, misc/ with 20+ mixed-concern files) dominate."
