# standards.toml — capability-category data for the ai-readiness-audit plugin
#
# Single source of truth for every scoring category used by the
# ai-sdlc-adoption metric set (and, in later tasks, by all 11 existing audit
# dimensions).  Parsed at runtime via `python3 -c 'import tomllib'`.
# Users may override by pointing sources.toml [standards].standards_file at
# their own copy of this file.
#
# Schema
# ------
# [meta]                  — global cadence / lookback constants
# [category.<slug>]       — one table per scoring category (ten required keys)
# [band.<slug>]           — one table per banded metric (DORA-style thresholds)
#
# Weight-seeding heuristic (deterministic, so Task A.4 is mechanical):
#   critical → 8   high → 5   medium → 3   low → 1
# Weights inside category tables are starting values; edit here to retune.

# ---------------------------------------------------------------------------
# [meta] — global constants
# ---------------------------------------------------------------------------

[meta]
monthly_bucket_days = 30
max_lookback_days = 730
standards_version = "2026.06"
# Users override by pointing sources.toml [standards].standards_file at their own copy.

# ---------------------------------------------------------------------------
# [category.*] — ai-sdlc-adoption metric categories
#
# Tier G: git-only signals
# ---------------------------------------------------------------------------

# ADP-G1: AI tooling depth & breadth
# One category per detectable tooling layer.  The canonical collector for all
# tooling-presence signals (CLAUDE.md/AGENTS.md/.claude/skills/commands/hooks/MCP)
# is the git collector — sources = ["git"] for every ADP-G1 category.

[category.ai_tooling_claude_md]
code = 101
metric = "adp_g1_tooling_depth"
dimension = "ai-sdlc-adoption"
weight = 10
definition = "Repo has a non-trivial CLAUDE.md or AGENTS.md providing agent context"
applies_when = "always"
sources = ["git"]
reliability_default = "maximal"   # presence != active use → true usage ≤ shown
source = "AWOS conventions"
source_year = 2026

[category.ai_tooling_skills]
code = 102
metric = "adp_g1_tooling_depth"
dimension = "ai-sdlc-adoption"
weight = 6
definition = "Repo defines .claude/skills/*/SKILL.md agent skill files"
applies_when = "always"
sources = ["git"]
reliability_default = "maximal"
source = "AWOS conventions"
source_year = 2026

[category.ai_tooling_commands]
code = 103
metric = "adp_g1_tooling_depth"
dimension = "ai-sdlc-adoption"
weight = 5
definition = "Repo defines .claude/commands/ custom slash commands"
applies_when = "always"
sources = ["git"]
reliability_default = "maximal"
source = "AWOS conventions"
source_year = 2026

[category.ai_tooling_hooks]
code = 104
metric = "adp_g1_tooling_depth"
dimension = "ai-sdlc-adoption"
weight = 5
definition = "Repo defines .claude/hooks/ lifecycle hooks"
