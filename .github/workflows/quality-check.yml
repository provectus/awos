name: Quality Check

on:
  pull_request:
    types: [opened, synchronize]

permissions: {}

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run prettier check
        # Pin the exact version: this job has no `npm ci`, so a bare `npx prettier`
        # fetches the latest release (a floating `^` range let CI grab 3.9.1 and
        # reformat files that are clean under the pinned 3.8.4). Keep in lockstep
        # with the prettier devDependency in package.json.
        run: npx prettier@3.8.4 . --check

  # Test suite — non-blocking initially.
  # Flip `continue-on-error: false` to make this a required gate once it has
  # been green on two consecutive PRs (see plan PR 4).
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # Coverage report — always runs, prints the per-file table to the job
  # log so reviewers can see exactly which lines are uncovered without
  # rerunning anything locally. Non-blocking (continue-on-error: true)
  # while teams ratchet up the numbers.
  coverage-report:
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Measure coverage
        run: npm run test:coverage

  # Node/TypeScript engine — builds the esbuild bundle and runs the
  # node:test/tsx engine test suite. Non-blocking until green on two
  # consecutive PRs (flip continue-on-error: false then).
  node-engine:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck engine
        run: npm run typecheck

      - name: Build engine bundle
        run: npm run build:audit-engine

      # The bundle is committed (shipped to users — they run dist/cli.js, not a
      # local build). Fail if a rebuild diverges from what was committed, so a
      # source edit can never ship with a stale bundle. Stage dist/ first so
      # untracked additions (e.g. a newly bundled grammar) fail the check too —
      # a plain `git diff` only sees modifications to tracked files.
      - name: Verify committed bundle is in sync with source
        run: |
          git add -A plugins/awos/skills/ai-readiness-audit/dist
          git diff --cached --exit-code -- plugins/awos/skills/ai-readiness-audit/dist

      - name: Run engine tests
        run: node --import tsx --test "plugins/awos/skills/ai-readiness-audit/**/*.test.ts"

  # Coverage gate — fails the job when src/ coverage drops below the
  # thresholds hardcoded below. To raise the floor, edit this block.
  coverage-gate:
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      COVERAGE_LINES: '90'
      COVERAGE_FUNCTIONS: '95'
      COVERAGE_BRANCHES: '90'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Enforce coverage thresholds
        run: npm run test:coverage:gate
