# --- ai-development-tooling (7 checks) ---

[category.ai_development_tooling_ai_01]
code = 2000
metric = "AI-01"
dimension = "ai-development-tooling"
weight = 8
method = "judgment"
rubric = "Read all agent instruction files (CLAUDE.md, AGENTS.md, GEMINI.md, .cursorrules, .github/copilot-instructions.md, etc.). PASS if the combined ecosystem covers project-specific non-obvious context (architecture decisions, conventions, gotchas) that an agent cannot discover on its own from the source code. WARN if the files exist but contain only boilerplate, directory trees, or obvious facts. FAIL if no agent instruction files exist or all content is trivially discoverable by reading the code."
evidence_required = ["list of all agent instruction files found", "sample of 3+ non-obvious facts each provides", "assessment of whether any file contains only boilerplate"]
