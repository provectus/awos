# cyclomatic_complexity: Cyclomatic complexity (via web-tree-sitter AST)

[category.code_churn.scoring]
scale = "linear"
anchors = [[0.0, 1.0], [0.12, 0.8], [0.18, 0.4], [0.3, 0.0]]
anchor_unit = "share of recently-authored lines deleted again inside the window (0..1)"
basis = "heuristic"
basis_note = "DX Core 4 publishes no numeric code-turnover thresholds; anchors are AWOS heuristics."

[category.cyclomatic_complexity]
code = 1301
check_id = "DESC-03"
metric = "cyclomatic_complexity"
dimension = "descriptors"
weight = 0
method = "computed"
definition = "Average and maximum cyclomatic complexity (CCN) per function, plus high-complexity hotspot count above threshold. Computed via AST decision-point counting for all bundled languages; files in unbundled languages are skipped."
applies_when = "always"
sources = ["scale"]
reliability_default = "not-reliable"
source = "McCabe 1976"
url = "https://doi.org/10.1109/TSE.1976.233837"
date = "1976-07"
last_verified = "2026-07-06"

# loc_scale: Lines of code and scale

[category.cyclomatic_complexity.scoring]
scale = "linear"
anchors = [[1, 1.0], [5, 1.0], [10, 0.75], [15, 0.5], [30, 0.0]]
anchor_unit = "average cyclomatic complexity per function"
basis = "derived"
basis_note = "The CCN 10 boundary is McCabe's published 'reasonable upper limit'; the plateau below 5 and the decay to 30 are AWOS calibration."

[category.loc_scale]
code = 1302
check_id = "DESC-04"
metric = "loc_scale"
dimension = "descriptors"
weight = 0
method = "computed"
definition = "Total source-file line count (LOC), per-language breakdown, and file count; a scale signal for contextualising other metrics"
applies_when = "always"
sources = ["scale"]
reliability_default = "not-reliable"
source = "Wikipedia — Source lines of code (physical SLOC)"
url = "https://en.wikipedia.org/wiki/Source_lines_of_code"
date = "2025"
last_verified = "2026-07-06"

# dependency_count: Direct dependency count (manifest-based)

[category.dependency_count]
code = 1303
check_id = "DESC-05"
metric = "dependency_count"
dimension = "descriptors"
weight = 0
method = "computed"
definition = "Direct-dependency count from package manifests (package.json / pyproject.toml / go.mod / Cargo.toml / requirements.txt)"
applies_when = "always"
sources = ["scale"]
reliability_default = "not-reliable"
source = "OWASP SCVS"
url = "https://owasp.org/www-project-software-component-verification-standard/"
date = "2020"
last_verified = "2026-07-06"

