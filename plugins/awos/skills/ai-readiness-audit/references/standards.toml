# AS-10: Authorization correctness (judgment)
[category.appsec_authorization_correctness]
code = 3009
metric = "AS-10"
dimension = "application-security"
weight = 8
method = "judgment"
definition = "Authorization checks are applied consistently to all protected resources; no privilege-escalation paths are evident per ASVS 5.0.0 L1 (V4.1.1)"
applies_when = "topology.uses_auth"
sources = ["audit"]
reliability_default = "maximal"
rubric = "Review route/controller handlers: do all state-changing endpoints verify the caller's identity and role before acting? Look for missing auth checks on update/delete paths, IDOR patterns (direct object references without ownership check), and admin actions accessible to unprivileged roles."
evidence_required = ["list of protected endpoints and their auth middleware/decorator", "any endpoints that bypass the auth layer and the justification", "access-control model (RBAC/ABAC/ownership) — source files where it is enforced"]
source = "OWASP ASVS"
url = "https://owasp.org/www-project-application-security-verification-standard/"
date = "2025-05-30"
last_verified = "2026-06-29"

# AS-11: Insecure design review (judgment)
[category.appsec_insecure_design]
code = 3010
metric = "AS-11"
dimension = "application-security"
weight = 5
method = "judgment"
definition = "The overall HTTP API design does not exhibit systemic insecure-design patterns per ASVS 5.0.0 L1 (V1.1.1)"
applies_when = "topology.has_http_api"
sources = ["audit"]
reliability_default = "maximal"
rubric = "Examine the API surface for systemic insecure-design patterns: mass assignment vulnerabilities (binding all request fields to model), missing object-level access control, sensitive data exposure in error messages, lack of security context in the design (no mention of threat model, security requirements, or defense in depth). Score PASS if no systemic issues are evident, WARN if one issue is found, FAIL if two or more are present."
evidence_required = ["API surface overview (routes, methods, input models)", "error-handling approach and what details are returned to clients", "any existing threat model or security design documentation"]
source = "OWASP ASVS"
url = "https://owasp.org/www-project-application-security-verification-standard/"
