sources = ["git"]
reliability_default = "not-reliable"
source = "AWOS conventions"
source_year = 2026

# ADP-G9: AI-attributed change share (lower bound)

[category.ai_attribution]
code = 901
metric = "adp_g9_ai_attribution"
dimension = "ai-sdlc-adoption"
weight = 5
definition = "Share of commits/PRs carrying AI markers (Co-authored-by: trailer, agent label). Always a lower bound — true usage >= shown."
applies_when = "always"
sources = ["git"]
reliability_default = "minimal"   # true usage >= shown: attribution is easily disabled
source = "AWOS conventions"
source_year = 2026

# ---------------------------------------------------------------------------
# Tier C: CI source categories
# ---------------------------------------------------------------------------

[category.ci_pass_rate]
code = 1001
metric = "adp_c1_ci_pass_rate"
dimension = "ai-sdlc-adoption"
weight = 5
definition = "Default-branch CI pass rate; feature-branch failures excluded; treated as supporting evidence, not headline"
applies_when = "topology.has_ci"
sources = ["ci"]
reliability_default = "not-reliable"
source = "Martin Fowler CI/CD"
source_year = 2024

[category.pipeline_duration_trend]
code = 1002
metric = "adp_c2_pipeline_duration"
dimension = "ai-sdlc-adoption"
weight = 3
definition = "Feedback-loop speed: pipeline duration trend over the lookback window"
applies_when = "topology.has_ci"
sources = ["ci"]
reliability_default = "not-reliable"
source = "Martin Fowler CI/CD"
source_year = 2024

