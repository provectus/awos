reliability_default = "not-reliable"
source = "AWOS conventions"
source_year = 2026

# ADP-G7: Change failure rate proxy (DORA banded)

[category.change_failure_rate]
code = 701
metric = "adp_g7_change_fail_rate"
dimension = "ai-sdlc-adoption"
weight = 5
definition = "Share of default-branch merges followed within N days by a revert/hotfix commit"
applies_when = "always"
sources = ["git"]
reliability_default = "not-reliable"
source = "DORA State of DevOps"
source_year = 2024

# ADP-G8: Review rework cycle (banded)

[category.review_rework]
code = 801
metric = "adp_g8_review_rework"
dimension = "ai-sdlc-adoption"
weight = 3
definition = "Review rounds and time-to-resolve-review-threads per PR; proxied from post-open commits when no host data is available"
