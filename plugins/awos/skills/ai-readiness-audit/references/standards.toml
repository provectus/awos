# ADP-G2: Active monthly contributors

[category.active_contributors]
code = 201
metric = "adp_g2_contributors"
dimension = "ai-sdlc-adoption"
weight = 3
definition = "Distinct commit-author count per trailing 30-day bucket (aggregate only, no PII)"
applies_when = "always"
sources = ["git"]
reliability_default = "not-reliable"   # raw count; no direction implied without context
source = "AWOS conventions"
source_year = 2026

# ADP-G3: Deployment / merge frequency (DORA banded)

[category.merge_frequency]
code = 301
metric = "adp_g3_deploy_frequency"
dimension = "ai-sdlc-adoption"
weight = 5
definition = "Merges into the default branch per week (DORA deployment frequency proxy)"
applies_when = "always"
sources = ["git"]
reliability_default = "not-reliable"   # direction depends on team size; banded comparison is the signal
source = "DORA State of DevOps"
source_year = 2024

# ADP-G4: Lead time for change (DORA banded)

[category.lead_time_for_change]
code = 401
metric = "adp_g4_lead_time"
dimension = "ai-sdlc-adoption"
weight = 5
definition = "Median time from first commit on a branch to its merge into the default branch"
applies_when = "always"
sources = ["git"]
reliability_default = "not-reliable"   # direction depends on team; banded comparison is the signal
source = "DORA State of DevOps"
source_year = 2024

# ADP-G5: PR cycle time (banded)

[category.pr_cycle_time]
code = 501
metric = "adp_g5_pr_cycle_time"
dimension = "ai-sdlc-adoption"
weight = 3
definition = "Time from PR open to merge; low-confidence (git-approximation) when no code-host connector is available"
applies_when = "always"
sources = ["git"]
reliability_default = "not-reliable"
source = "DORA State of DevOps"
source_year = 2024

