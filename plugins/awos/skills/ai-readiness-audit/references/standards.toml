# standards.toml — capability-category data for the ai-readiness-audit plugin
#
# Single source of truth for every scoring category used by the
# ai-sdlc-adoption metric set (and, in later tasks, by all 11 existing audit
# dimensions).  Parsed at runtime via `node dist/cli.js standards` (smol-toml).
# Weights and bands are data — retune by editing this file (or a project-local
# copy the engine is pointed at).
#
# Schema
# ------
# [meta]                  — global cadence / lookback constants
# [category.<slug>]       — one table per scoring category (ten required keys)
# [category.<slug>.scoring] — declared score curve for banded metrics
#                           (scale, anchors, basis, basis_note); the engine
#                           refuses to score a banded metric without one
# [band.<slug>]           — one table per banded metric (DORA-style thresholds)
#
# Weight-seeding heuristic (deterministic, so Task A.4 is mechanical):
#   critical → 8   high → 5   medium → 3   low → 1
# Weights inside category tables are starting values; edit here to retune.

# ---------------------------------------------------------------------------
# [meta] — global constants
# ---------------------------------------------------------------------------

[meta]
max_lookback_days = 90
active_contributor_threshold = 0.05
rework_horizon_days = 21
standards_version = "2026.06"
# Report row-highlight thresholds, applied to each check's awarded-weight
# share (weight_awarded / weight_max) — NOT to its status label. A check keeps
# its status; the row color says how much of the weight it actually earned:
# green >= yellow threshold, yellow below it, red below the red threshold.
highlight_yellow_below = 0.95
highlight_red_below = 0.05
# Report/dimension presentation order — industry-standard engineering first,
# AI-frontier dimensions last, unscored descriptors at the very end.
dimension_order = [
  "delivery-flow",
  "software-best-practices",
  "code-architecture",
  "quality-assurance",
  "application-security",
  "supply-chain-security",
  "ai-security",
  "documentation",
  "ai-development-tooling",
  "spec-driven-development",
  "ai-sdlc-adoption",
  "descriptors",
]

# --- delivery-flow (7 checks) ---

# merge_frequency: Deployment / merge frequency (DORA banded)

[category.merge_frequency]
code = 301
check_id = "DF-01"
metric = "merge_frequency"
dimension = "delivery-flow"
weight = 10
method = "computed"
definition = "Merges into the default branch per week (DORA deployment frequency proxy)"
applies_when = "always"
sources = ["git"]
reliability_default = "not-reliable"   # direction depends on team size; banded comparison is the signal
source = "DORA Accelerate State of DevOps 2023"
url = "https://dora.dev/research/2023/dora-report/2023-dora-accelerate-state-of-devops-report.pdf"
date = "2023-12"
last_verified = "2026-07-06"

# lead_time_for_change: Lead time for change (DORA banded)

[category.merge_frequency.scoring]
scale = "log"
anchors = [[0.03, 0.0], [0.25, 0.1], [1.0, 0.5], [7.0, 1.0]]
anchor_unit = "merges into the default branch per week"
basis = "derived"
basis_note = "x boundaries transcribe the DORA deployment-frequency bands (elite ≈ daily+, high = weekly–daily, medium = monthly–weekly, low < monthly) onto merges/week; the score awarded at each boundary is AWOS calibration — DORA publishes band labels, not scores."

[category.lead_time_for_change]
code = 401
check_id = "DF-02"
metric = "lead_time_for_change"
dimension = "delivery-flow"
weight = 10
method = "computed"
definition = "Median time from first commit on a branch to its merge into the default branch"
applies_when = "always"
sources = ["git"]
reliability_default = "minimal"   # git-approximated branch-first-commit is a lower bound; direction is the signal
source = "DORA Accelerate State of DevOps 2023"
url = "https://dora.dev/research/2023/dora-report/2023-dora-accelerate-state-of-devops-report.pdf"
date = "2023-12"
last_verified = "2026-07-06"

# pr_cycle_time: PR cycle time (banded)

[category.lead_time_for_change.scoring]
scale = "log"
anchors = [[1, 1.0], [24, 0.75], [168, 0.5], [720, 0.25], [2160, 0.0]]
anchor_unit = "median hours from first branch commit to merge"
basis = "derived"
basis_note = "x boundaries transcribe the DORA lead-time bands (elite < 1 day, high < 1 week, medium < 1 month, low ≥ 1 month, expressed in hours); the score at each boundary is AWOS calibration."

[category.pr_cycle_time]
code = 501
check_id = "DF-03"
metric = "pr_cycle_time"
dimension = "delivery-flow"
weight = 3
method = "computed"
definition = "Time from PR open to merge; low-confidence (git-approximation) when no code-host connector is available"
applies_when = "always"
sources = ["git"]
reliability_default = "not-reliable"
source = "DORA Accelerate State of DevOps 2023"
url = "https://dora.dev/research/2023/dora-report/2023-dora-accelerate-state-of-devops-report.pdf"
date = "2023-12"
last_verified = "2026-07-06"

# change_failure_rate: Change failure rate proxy (DORA banded)

[category.pr_cycle_time.scoring]
scale = "log"
anchors = [[1, 1.0], [24, 0.75], [168, 0.5], [720, 0.25], [2160, 0.0]]
anchor_unit = "median hours from PR open to merge"
basis = "heuristic"
basis_note = "No published numeric bands exist for PR cycle time; the curve mirrors the DORA lead-time bands as an AWOS heuristic."

[category.change_failure_rate]
code = 701
check_id = "DF-04"
metric = "change_failure_rate"
dimension = "delivery-flow"
weight = 10
method = "computed"
definition = "Share of the window's default-branch merge events that are reverts, hotfixes, or rollbacks (keyword proxy for the DORA change-failure rate)"
applies_when = "always"
sources = ["git"]
reliability_default = "minimal"   # keyword-detected reverts only; lower bound, true rate may be higher
source = "DORA Accelerate State of DevOps 2023"
url = "https://dora.dev/research/2023/dora-report/2023-dora-accelerate-state-of-devops-report.pdf"
date = "2023-12"
last_verified = "2026-07-06"

# review_rework: Review rework cycle (banded)

[category.change_failure_rate.scoring]
scale = "linear"
anchors = [[0.0, 1.0], [0.15, 0.0]]
anchor_unit = "share of default-branch merges that are reverts/rollbacks (0..1)"
basis = "derived"
basis_note = "The 15% zero-score point is the DORA 2023 medium-cluster change-failure rate (cluster values: elite 5%, high 10%, medium 15%, low 64%, report p. 12); reading them as contiguous bands and the straight-line decay from 0% are AWOS calibration."

[category.review_rework]
code = 801
check_id = "DF-05"
metric = "review_rework"
dimension = "delivery-flow"
weight = 3
method = "computed"
definition = "Review rounds and time-to-resolve-review-threads per PR; proxied from post-open commits when no host data is available"
applies_when = "always"
sources = ["git"]
reliability_default = "not-reliable"
source = "DX Core 4"
url = "https://getdx.com/research/measuring-developer-productivity-with-the-dx-core-4/"
date = "2024-12"
last_verified = "2026-07-06"

# rework_rate: Deployment rework rate (DORA 2024, git keyword proxy)

[category.review_rework.scoring]
scale = "linear"
anchors = [[2, 1.0], [4, 0.7], [6, 0.4], [10, 0.0]]
anchor_unit = "average commits per PR after open (post-review rework proxy)"
basis = "heuristic"
basis_note = "DX Core 4 publishes no numeric commits-per-PR thresholds; anchors are AWOS heuristics (~1–2 commits/PR = clean review flow, ≥10 = heavy rework)."

[category.rework_rate]
code = 1401
check_id = "DF-06"
metric = "rework_rate"
dimension = "delivery-flow"
weight = 10
method = "computed"
summary = "DORA deployment rework rate: share of deploys that are unplanned bug-fix work."
definition = "DORA deployment rework rate: ratio of deployments that are unplanned work to fix bugs triggered by incidents in production. Proxied from git: first-parent merges in the 90-day window whose subject matches fix/bugfix/hotfix/patch/defect/regression keywords (case-insensitive). Distinct from change_failure_rate (DF-04), which counts revert/rollback deployments, and from code_churn (DESC-02), which measures line-level turnover. DORA publishes no numeric thresholds for rework rate; bands (good <15%, watch <30%, concerning >=30%) are AWOS heuristics."
applies_when = "always"
sources = ["git"]
reliability_default = "minimal"
source = "DORA"
url = "https://dora.dev/guides/dora-metrics/"
date = "2026-01"
last_verified = "2026-07-06"

[category.rework_rate.scoring]
scale = "linear"
anchors = [[0.0, 1.0], [0.15, 0.8], [0.3, 0.4], [0.5, 0.0]]
anchor_unit = "share of window merges whose subject matches fix/hotfix keywords (0..1)"
basis = "heuristic"
basis_note = "DORA publishes no numeric rework-rate thresholds; the good <15% / watch <30% / concerning ≥30% shape is an AWOS heuristic (already stated in the definition)."

[category.mttr]
code = 1103
check_id = "DF-07"
metric = "mttr"
dimension = "delivery-flow"
weight = 5
method = "computed"
definition = "Mean time to recovery from incidents; SKIP unless a real incident source (PagerDuty/OpsGenie/incident.io) is explicitly provided"
applies_when = "topology.has_incident_source"
sources = ["tracker", "incident"]
reliability_default = "not-reliable"
source = "DORA Accelerate State of DevOps 2023"
url = "https://dora.dev/research/2023/dora-report/2023-dora-accelerate-state-of-devops-report.pdf"
date = "2023-12"
last_verified = "2026-07-06"

